version: "3.9"

services:
  cusdis:
    image: "djyde/cusdis:latest"
    container_name: cusdis
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - USERNAME=admin
      - PASSWORD=${CUSDIS_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - NEXTAUTH_URL=https://${CUSDIs_DOMAIN:-comments.bernardolopes.com}
      - DB_TYPE=pgsql
      - DB_URL=postgresql://cusdis:${POSTGRES_PASSWORD:-password}@pgsql:5432/cusdis
    depends_on:
      - pgsql

  pgsql:
    image: "postgres:13-alpine"
    container_name: cusdis-db
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=cusdis
      - POSTGRES_DB=cusdis
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cusdis-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - cusdis

# Create a .env file in the same directory with:
# CUSDIS_PASSWORD=your-secure-password
# POSTGRES_PASSWORD=your-db-password
# JWT_SECRET=random-long-string
# CLOUDFLARE_TUNNEL_TOKEN=your-token-from-cloudflare
# CUSDIs_DOMAIN=comments.bernardolopes.com
